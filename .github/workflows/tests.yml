on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

name: Test-Gallery-Models

jobs:
  pinned:
    name: renv-pinned (CRAN EpiModel per renv.lock)
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - name: Check Gallery Examples
        run: bash test.sh

  cran-latest:
    name: cran-latest (EpiModel from CRAN)
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Bypass the project .Rprofile so renv does not activate and
      # override the CRAN install from setup-r-dependencies.
      RENV_CONFIG_AUTOLOADER_ENABLED: "FALSE"

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Check Gallery Examples
        run: bash test.sh
